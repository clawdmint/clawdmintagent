# ═══════════════════════════════════════════════════════════════════════════════
# CLAWDMINT - NETLIFY CONFIGURATION
# ═══════════════════════════════════════════════════════════════════════════════

[build]
  # Generate NFT collection assets, copy to public/, then build Next.js
  command = "node scripts/generate-collection.js && node scripts/prepare-deploy.js && npm run build"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"
  # Disable Netlify's secrets scanning for this project
  # Server-side API routes legitimately access env vars which get bundled
  # These are NOT hardcoded secrets - they come from Netlify's env var system
  SECRETS_SCAN_ENABLED = "false"

# Netlify functions — increase timeout for API routes
[functions]
  external_node_modules = ["sharp"]
  node_bundler = "esbuild"
  included_files = ["docs/**"]

# Next.js Runtime - Otomatik public klasörü ve routing handle eder
[[plugins]]
  package = "@netlify/plugin-nextjs"

# DIKKAT: Wildcard redirect KALDIRILDI!
# Next.js plugin zaten routing'i handle ediyor
# Eski hatalı config:
#   [[redirects]]
#   from = "/*"
#   to = "/index.html"
#   status = 200

# Headers for security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# ═══════════════════════════════════════════════════════════════════════════════
# AWS LAMBDA ENV SIZE (4 KB) — DEPLOY FAILURES
# ═══════════════════════════════════════════════════════════════════════════════
#
# All site env vars scoped to "Functions" are sent to each Netlify Function (AWS Lambda).
# The total size of those names+values must stay under ~4096 bytes or deploy fails with:
#   "Your environment variables exceed the 4KB limit imposed by AWS Lambda"
#
# Fix in Netlify UI (Site settings → Environment variables):
#
# 1) SCOPES — Use "Build" only for variables that are inlined at `next build` and are NOT
#    read at runtime by Route Handlers / Server Components / middleware. Next.js bakes
#    NEXT_PUBLIC_* into client (and often server) bundles at build time; many of them do
#    not need to remain in the Lambda environment object. For each key: if "Functions"
#    is unchecked but the build still succeeds and runtime pages/APIs work, you saved space.
#    Start with the longest values (RPC URLs with API keys, JWTs).
#
#    Safe to try as "Build" only first (test after deploy):
#    - NEXT_PUBLIC_CPEG_BROWSER_RPC_URL  (only used from client components for Solana RPC)
#
# 2) REMOVE DUPLICATES — If two keys hold the same secret (e.g. EVM deployer vs Solana),
#    keep one and delete the other from Netlify after updating code references.
#
# 3) SHORTEN — Prefer one Pinata credential (e.g. PINATA_JWT only) if your flow allows.
#    Drop unused integration keys (Fairscale, Synapse SAP flags) from Production.
#
# 4) EXTERNAL CONFIG — For very large blobs, use Parameter Store / Secrets Manager / S3 and
#    read at runtime inside the function (Netlify blog: long env vars for functions).
#
# Values in [build.environment] above are build-time only and do NOT count toward Lambda env.
#
# ═══════════════════════════════════════════════════════════════════════════════
# ENVIRONMENT VARIABLES (Set these in Netlify Dashboard)
# ═══════════════════════════════════════════════════════════════════════════════
#
# Required:
#   DATABASE_URL
#   NEXT_PUBLIC_CHAIN_ID
#   NEXT_PUBLIC_FACTORY_ADDRESS
#   NEXT_PUBLIC_ALCHEMY_ID
#   NEXT_PUBLIC_WALLET_CONNECT_ID
#   DEPLOYER_PRIVATE_KEY
#   TREASURY_ADDRESS
#   PINATA_API_KEY
#   PINATA_SECRET_KEY
#   PINATA_JWT
#   AGENT_HMAC_SECRET
#   NEXT_PUBLIC_APP_URL (set to your Netlify URL)
#
# Optional:
#   TWITTER_BEARER_TOKEN
#   BASESCAN_API_KEY
#
# cPEG subdomain (same deploy, dual-domain on Netlify):
#   NEXT_PUBLIC_APP_URL — primary Clawdmint URL (menus + canonical for main OG)
#   NEXT_PUBLIC_CPEG_APP_URL — cPEG subdomain URL used by the header "cpeg" link & cPEG OG fallbacks
#   NEXT_PUBLIC_CPEG_SITE_HOST — exact hostname triggering short-path middleware (e.g. cpeg.clawdmint.xyz).
#                               Omit on branch previews / localhost unless testing with a hosts alias.
#
# ═══════════════════════════════════════════════════════════════════════════════
